<!DOCTYPE html>
<html>
  <head>
    <title>9d-f</title>
  </head>
  <body>
    <input placeholder="Name" class="js-name-input" onkeydown="handleKeyDown(event);">
    <button onclick="displayName();">Submit</button>
    <p class="js-name-output"></p>

    <script>
      function handleKeyDown(event) {
        if (event.key === 'Enter') {
          displayName();
        }
      }

      function displayName() {
        const inputElement = document.querySelector('.js-name-input');
        
        document.querySelector('.js-name-output')
          .innerHTML = `Your name is: ${inputElement.value}`;
      }
    </script>
  </body>
</html>
