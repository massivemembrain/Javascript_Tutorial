<!DOCTYPE html>
<html>
  <head>
    <title>9h</title>
  </head>
  <body>

    <input placeholder="Type Something" class="js-input" onkeyup="addText(event);">
    <p class="js-mirror"></p>

    <script>
      function addText(event) {
        const inputElement = document.querySelector('.js-input');
        document.querySelector('.js-mirror')
          .innerHTML = inputElement.value;
        
      }
    </script>
  </body>
</html>
