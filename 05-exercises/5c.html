    <body>
        <script>
            const coffee = 5;
            const bagel = 3;
            const soup = 9;

            let cost = 1 * coffee + 2 * bagel + 1 * soup;

            let tax = cost * 0.1;

            let total = cost + tax;
            console.log(`Cost of food: $${cost}`);
            console.log(`Tax (10%): $${tax}`);
            console.log(`Total cost: $${total}`);
        </script>
    </body>
</html>
