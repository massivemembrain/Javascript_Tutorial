<!DOCTYPE html>
<html>
  <head>
    <title>Cart Quantity</title>

  </head>
  <body>
    <button onclick="
      console.log(`Cart quantity: ${cartQuantity}`);
    ">Show Quantity</button>

    <button onclick="
      updateCartQuantity(1);
    ">Add to Cart</button>
    <button onclick="
      updateCartQuantity(2);
    ">+2</button>
    <button onclick="
      updateCartQuantity(3);
    ">+3</button>
    <button onclick="
      updateCartQuantity(4);
    ">+4</button>
    <button onclick="
      updateCartQuantity(5);
    ">+5</button>
    <button onclick="
      updateCartQuantity(-1);
    ">Remove from cart</button>
    <button onclick="
      updateCartQuantity(-2);
    ">-2</button>
    <button onclick="
      updateCartQuantity(-3);
    ">-3</button>
    <p class="js-cart-quantity"></p>
    <button onclick="
      cartQuantity = 0;
      console.log('Cart was reset.');
      document.querySelector('.js-cart-quantity')
          .innerHTML = `Cart Quantity: ${cartQuantity}`;
    ">Reset Cart</button>
    <script>
      let cartQuantity = 0;
      updateCartQuantity(cartQuantity);

      function updateCartQuantity(value) {
        if (value > 0 && cartQuantity + value > 10) {
          alert('The cart is full');
          return;
        }
        if (value < 0 && cartQuantity + value < 0) {
          alert('Not enough items in the cart');
          return;
        }

        cartQuantity += value;
        document.querySelector('.js-cart-quantity')
          .innerHTML = `Cart Quantity: ${cartQuantity}`;
        return cartQuantity;
      }

    </script>
  </body>
</html>
