<!DOCTYPE html>
<html>
  <head>
    <title>7g-i</title>
  </head>
  <body>
    
    <script>
      function convertLength(length, from, to) {
        if (from === 'miles') {
          if (to === 'km') {
            return (length * 1.6) + ' ' + to;
          } else if (to === 'feet') {
            return (length * 5280) + ' ' + to;
          } else if (to === 'miles') {
            return length + ' ' + to;
          } else {
            return `Invalid unit: ${to}`;
          }
        } else if (from === 'km') {
          if (to === 'miles') {
            return (length / 1.6) + ' ' + to;
          } else if (to === 'feet') {
            return (length * 3281) + ' ' + to;
          } else if (to === 'km') {
            return length + ' ' + to;
          } else {
            return `Invalid unit: ${to}`;
          }
        } else if (from === 'feet') {
          if (to === 'miles') {
            return (length / 5280) + ' ' + to;
          } else if (to === 'km') {
            return (length * 3281) + ' ' + to;
          } else if (to === 'feet') {
            return length + ' ' + to;
          } else {
            return `Invalid unit: ${to}`;
          }
        } else {
          return `Invalid unit: ${from}`;
        }
      }

      console.log(convertLength(50, 'miles', 'km'));
      console.log(convertLength(32, 'km', 'miles'));
      console.log(convertLength(5, 'lbs', 'lbs'));
      console.log(convertLength(50, 'km', 'km'));

    </script>
  </body>
</html>
