<!DOCTYPE html>
<html>
  <head>
    <title>6f-j</title>
  </head>
  <body>
    <button onclick="
      playGame('heads')
    ">Heads</button>
    
    <button onclick="
      playGame('tails');
    ">Tails</button>

    <button onclick="
      score.wins = 0;
      score.losses = 0;
      localStorage.removeItem('score')">
      Reset
    </button>

    <script>
      let random = Math.random();
      let result = '';
      let guess = '';

      const score = JSON.parse(localStorage.getItem('score')) || {
        wins: 0,
        losses: 0
      };

      function playGame (guess) {
        random = Math.random();
        result = random < 0.5 ? 'heads' : 'tails';
        if (guess === result) {
          console.log('You win!');
          score.wins++;
          localStorage.setItem('score', JSON.stringify(score));
        } else {
          console.log('You lose!');
          score.losses++;
          localStorage.setItem('score', JSON.stringify(score));
        }

        console.log(score);
      }

    </script>
  </body>
</html>
